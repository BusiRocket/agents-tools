interface:
  display_name: BRP Fix
  short_description: Reproduce, isolate, fix, and verify software bugs safely.
  default_prompt:
    Reproduce the bug, apply the narrowest safe fix, add regression coverage, and report
    verification plus residual risk.
  brand_color: "#B91C1C"
policy:
  allow_implicit_invocation: true
busirocket:
  skill_class: workflow
  requires_references: true
  failure_mode:
    Escalate to brp-debug when the root cause is still unclear or to brp-plan when the fix expands
    beyond a minimal patch.
