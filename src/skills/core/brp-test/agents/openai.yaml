interface:
  display_name: BRP Test
  short_description: Design and run validation tests for implemented changes.
  default_prompt:
    Add or update the smallest deterministic tests that prove the changed behavior, then report
    commands and remaining gaps.
  brand_color: "#0F766E"
policy:
  allow_implicit_invocation: true
busirocket:
  skill_class: workflow
  requires_references: true
  failure_mode:
    Escalate to brp-plan when coverage needs depend on unresolved requirements or missing
    architecture decisions.
